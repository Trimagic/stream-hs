<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Streamer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Media root">
        <div>
          <h1>Video Streamer</h1>
          <p id="rootLabel">Root is not configured</p>
        </div>
        <form id="rootForm" class="root-form">
          <input id="rootInput" name="root" type="text" autocomplete="off" placeholder="C:\Videos or /home/user/videos">
          <button type="submit">Open</button>
        </form>
      </section>

      <section class="player-section" aria-label="Video player">
        <video id="player" preload="metadata" playsinline></video>
        <div class="controls" aria-label="Player controls">
          <button id="playToggle" class="icon-button" type="button" aria-label="Play or pause">Play</button>
          <span id="currentTime" class="time-label">0:00</span>
          <input id="seekSlider" class="seek-slider" type="range" min="0" max="1000" value="0" step="1" aria-label="Seek">
          <span id="durationTime" class="time-label">Live</span>
          <button id="muteToggle" class="icon-button" type="button" aria-label="Mute or unmute">Sound</button>
          <input id="volumeSlider" class="volume-slider" type="range" min="0" max="1" value="1" step="0.01" aria-label="Volume">
        </div>
        <div class="now-playing">
          <span>Now playing</span>
          <strong id="nowPlaying">Select a video</strong>
        </div>
      </section>

      <section class="browser">
        <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumbs"></nav>
        <div id="message" class="message" hidden></div>
        <div id="folderList" class="grid"></div>
        <div id="videoList" class="list"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
